name: Calculator CI/CD Pipeline

# Тригери: коли саме запускати цю перевірку
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Назва нашого завдання
  build-and-test:
    name: Build and Test
    # Віртуальна машина, на якій все буде працювати
    runs-on: ubuntu-latest

    steps:
      # Крок 1: Завантажуємо код твого проєкту на віртуальну машину
      - name: Checkout repository
        uses: actions/checkout@v4

      # Крок 2: Встановлюємо середовище Node.js (щоб працював npm)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Крок 3: Встановлюємо всі залежності (Vite, ESLint, Playwright тощо)
      - name: Install dependencies
        run: npm ci

      # Крок 4: Запускаємо лінтер для перевірки якості коду
      - name: Run linter
        run: npm run lint

      # Крок 5: Запускаємо модульні тести (Unit Tests)
      - name: Run unit tests
        run: npm run test:unit

      # Крок 6: Перевіряємо, чи збирається артефакт (Production Build)
      - name: Build for production
        run: npm run build