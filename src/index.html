<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Calculator - Lab 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display" id="display" data-testid="display">0</div>
        <div class="buttons" id="keypad">
            <button class="btn clear" data-action="clear">C</button>
            <button class="btn operator" data-action="operator" data-val="/">÷</button>
            <button class="btn operator" data-action="operator" data-val="*">×</button>
            <button class="btn operator" data-action="operator" data-val="-">−</button>
            
            <button class="btn" data-action="number" data-val="7">7</button>
            <button class="btn" data-action="number" data-val="8">8</button>
            <button class="btn" data-action="number" data-val="9">9</button>
            <button class="btn operator plus" data-action="operator" data-val="+">+</button>
            
            <button class="btn" data-action="number" data-val="4">4</button>
            <button class="btn" data-action="number" data-val="5">5</button>
            <button class="btn" data-action="number" data-val="6">6</button>
            
            <button class="btn" data-action="number" data-val="1">1</button>
            <button class="btn" data-action="number" data-val="2">2</button>
            <button class="btn" data-action="number" data-val="3">3</button>
            <button class="btn equal" data-action="calculate" data-testid="equal">=</button>
            
            <button class="btn zero" data-action="number" data-val="0">0</button>
            <button class="btn" data-action="number" data-val=".">.</button>
        </div>
    </div>
    <script type="module" src="dom.js"></script>
</body>
</html>
